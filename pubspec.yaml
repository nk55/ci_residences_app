name: ci_residences_app
description: Application CI Résidences
publish_to: 'none'

version: 1.1.1+20


environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  google_fonts: ^6.3.3
  share_plus: ^10.0.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_paystack_plus: ^2.5.0
  app_links: ^6.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/icon.png